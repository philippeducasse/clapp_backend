services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-philippe} -d ${DB_NAME:-clapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    image: ${REGISTRY_URL}/clapp_backend:latest
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=conf.settings.prod
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
  next:
    image: ${REGISTRY_URL}/clapp_frontend:latest
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://django:8000
    depends_on:
      django:
        condition: service_healthy
    networks:
      - clapp-network

  nginx:
    image: nginx:alpine
    ports:
      # - "80:80"
      # - "443:443"
        - "127.0.0.1:8085:80"  # Only accessible from localhost
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - django
      - next
    networks:
      - clapp-network

  redis:
    image: redis:alpine
    networks:
      - clapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    image: ${REGISTRY_URL}/clapp_backend:latest
    entrypoint: ["/app/entrypoint-celery.sh"]
    command: celery -A clapp_backend worker --loglevel=info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=conf.settings.prod
      - DB_HOST=db
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clapp-network
    volumes:
      - media_volume:/app/media

  celery_beat:
    image: ${REGISTRY_URL}/clapp_backend:latest
    entrypoint: ["/app/entrypoint-celery.sh"]
    command: celery -A clapp_backend beat --loglevel=info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=conf.settings.prod
      - DB_HOST=db
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clapp-network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  clapp-network:
    driver: bridge