name: deploy

on:
  push:
    branches:
      - production

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  build_and_deploy_image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Django image
        run: docker build -f docker/dockerfile -t  ${{ secrets.DOCKER_USERNAME }}/clapp_backend:latest .

      - name: Push to registry
        run: docker push ${{ secrets.DOCKER_USERNAME }}/clapp_backend:latest

      - name: Check if config files changed
        id: config_changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E 'docker/(docker-compose\.yml|nginx\.conf)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker-compose file
        if: steps.config_changed.outputs.changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.yml,docker/nginx.conf"
          target: "~/clapp/"

      - name: Copy environment variables to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/clapp
            cat > ~/clapp/.env << 'EOF'
            APP_EMAIL=${{ secrets.APP_EMAIL }}
            DB_ENGINE=${{ secrets.DB_ENGINE }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/clapp
            docker compose pull django
            docker compose up -d django
            docker image prune -f
